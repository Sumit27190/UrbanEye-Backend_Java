# Server Configuration
server.port=${PORT:5000}

# Database Connection
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/crowdsourced}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Multipart Uploads (for Cloudinary image uploads)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Cloudinary Credentials
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# Security / JWT Credentials
jwt.secret=${JWT_SECRET:fallback_secret_for_local_dev}

# Logging Configuration
logging.level.root=INFO
logging.level.com.urbaneye.backend=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n
logging.file.name=logs/application.log
logging.file.max-size=10MB
logging.file.max-history=10
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
# CORS Configuration
cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,https://urban-eye-i65hcnvsa-sumits-projects-f69f9dbe.vercel.app}
